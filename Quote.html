<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCC Quote Tool</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- html2canvas and jsPDF for 1:1 Perfect PDF Capture -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- LZ-String for URL Compression -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3ede0;
            color: #000000;
        }

        /* Remove number input spinners */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }

        .verizon-red { color: #f50a23; }
        .bg-verizon-red { background-color: #f50a23; }
        
        .hardware-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Prevent scrolling from changing numbers */
        input[type=number] {
            touch-action: manipulation;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const SMARTPHONE_PLANS = [
            { name: 'Unlimited Welcome', costs: [75, 65, 50, 40], autopay: 10 },
            { name: 'Unlimited Plus', costs: [90, 80, 65, 55], autopay: 10, discountSlots: 1 },
            { name: 'Unlimited Ultimate', costs: [100, 90, 75, 65], autopay: 10, discountSlots: 2 },
            { name: 'Custom', costs: [0, 0, 0, 0], autopay: 0 }
        ];

        const TABLET_PLANS = [
            { name: 'Welcome', price: 20 },
            { name: 'Unlimited', price: 40 },
            { name: 'Unlimited Plus', price: 50 },
            { name: 'Custom', price: 0 }
        ];

        const WATCH_PLANS = [
            { name: 'Unlimited', price: 15 },
            { name: 'Unlimited Plus', price: 25 },
            { name: 'Custom', price: 0 }
        ];

        const HOME_INTERNET_PLANS = [
            { name: 'LTE Home', price: 60, mhDiscount: 15, autopay: 10 },
            { name: 'LTE Home Plus', price: 80, mhDiscount: 15, autopay: 10 },
            { name: '5G Home', price: 60, mhDiscount: 15, autopay: 10 },
            { name: '5G Home Plus', price: 70, mhDiscount: 15, autopay: 10 },
            { name: '5G Home Ultimate', price: 85, mhDiscount: 15, autopay: 10 },
            { name: 'VHI Lite', price: 60, mhDiscount: 15, autopay: 10 },
            { name: 'Custom', price: 0, mhDiscount: 0, autopay: 0 }
        ];

        const PERKS = [
            { name: 'Disney Bundle', cost: 10, savings: 9.99 },
            { name: 'Netflix & HBO Max', cost: 10, savings: 8.98 },
            { name: 'Google AI Pro', cost: 10, savings: 9.99 },
            { name: 'Apple One Individual', cost: 15, savings: 4.95 },
            { name: 'Apple One Family', cost: 20, savings: 5.95 },
            { name: 'Apple Music Family', cost: 10, savings: 6.99 },
            { name: '100GB Hotspot', cost: 10, savings: 30 },
            { name: 'YouTube Premium', cost: 10, savings: 3.99 },
            { name: 'Unlimited Cloud Storage', cost: 10, savings: 3.99 },
            { name: 'Verizon Family Plus', cost: 10, savings: 4.99 },
            { name: 'Second Number', cost: 10, savings: 5 },
            { name: '3 TravelPass Days', cost: 10, savings: 26 },
            { name: 'Fox One', cost: 15, savings: 4.99 },
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconData = lucide.icons[name] || lucide[name];
            if (!iconData) return null;
            return (
                <svg
                    width={size} height={size} viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                    className={className}
                >
                    {iconData.map(([tag, attrs], i) => React.createElement(tag, { ...attrs, key: i }))}
                </svg>
            );
        };

        const App = () => {
            const [view, setView] = useState('rep');
            const [customerViewMode, setCustomerViewMode] = useState('detailed');
            const [customerName, setCustomerName] = useState('');
            const [showNameField, setShowNameField] = useState(false);
            const [lines, setLines] = useState([]);
            const [accountAdjustments, setAccountAdjustments] = useState([]);
            const [multiDeviceProtection, setMultiDeviceProtection] = useState(false);
            const [activePerkLineId, setActivePerkLineId] = useState(null);
            const [activeHardwareLineId, setActiveHardwareLineId] = useState(null);
            const [activeAdjLineId, setActiveAdjLineId] = useState(null);
            const [showAccountAdj, setShowAccountAdj] = useState(false);
            const [oneTimeCredits, setOneTimeCredits] = useState([]);
            const [showOneTimeCreditsModal, setShowOneTimeCreditsModal] = useState(false);
            const [editingLabelId, setEditingLabelId] = useState(null);
            
            // PDF Generation States
            const [scale, setScale] = useState(1);
            const [pdfHeight, setPdfHeight] = useState(1100);
            const [isGeneratingPdf, setIsGeneratingPdf] = useState(false);

            // Share Link States
            const [isCopied, setIsCopied] = useState(false);

            // Import Quote from URL Hash on Initial Load
            useEffect(() => {
                const hash = window.location.hash;
                let loadedFromHash = false;
                
                if (hash.startsWith('#quote=')) {
                    try {
                        const compressed = hash.substring(7);
                        const jsonString = LZString.decompressFromEncodedURIComponent(compressed);
                        if (jsonString) {
                            const state = JSON.parse(jsonString);
                            if (state.lines && state.lines.length > 0) {
                                setLines(state.lines);
                                loadedFromHash = true;
                            }
                            if (state.accountAdjustments) setAccountAdjustments(state.accountAdjustments);
                            if (state.multiDeviceProtection !== undefined) setMultiDeviceProtection(state.multiDeviceProtection);
                            if (state.oneTimeCredits) setOneTimeCredits(state.oneTimeCredits);
                            if (state.customerName) {
                                setCustomerName(state.customerName);
                                setShowNameField(true);
                            }
                        }
                    } catch (e) {
                        console.error("Failed to load quote from URL", e);
                    }
                }
                
                if (!loadedFromHash && lines.length === 0) {
                    addLine('Smartphone');
                }
            }, []);

            // Mobile view scaling logic ONLY for the print preview HTML Container
            useEffect(() => {
                const updateScale = () => {
                    if (view === 'print') {
                        if (window.innerWidth < 880) {
                            setScale((window.innerWidth - 32) / 850); 
                        } else {
                            setScale(1);
                        }
                    }
                };
                window.addEventListener('resize', updateScale);
                updateScale();
                return () => window.removeEventListener('resize', updateScale);
            }, [view]);

            // Accurately measure dynamic height for drawing the red dashed preview lines
            useEffect(() => {
                if (view === 'print') {
                    const checkHeight = () => {
                        const el = document.getElementById('pdf-page-render-0');
                        if (el && el.offsetHeight !== pdfHeight) {
                            setPdfHeight(el.offsetHeight);
                        }
                    };
                    checkHeight();
                    const interval = setInterval(checkHeight, 300); // Catch async font/icon loads
                    return () => clearInterval(interval);
                }
            }, [view, pdfHeight, customerViewMode]);

            const handlePrintPreview = () => {
                setView('print');
                window.scrollTo(0, 0); // Always start preview at the top
            };

            const handleShareLink = () => {
                const stateToSave = {
                    lines,
                    accountAdjustments,
                    multiDeviceProtection,
                    oneTimeCredits,
                    customerName
                };
                const compressed = LZString.compressToEncodedURIComponent(JSON.stringify(stateToSave));
                const shareUrl = `${window.location.origin}${window.location.pathname}#quote=${compressed}`;
                
                // Fallback copy mechanism for broad browser/iframe support
                const textArea = document.createElement("textarea");
                textArea.value = shareUrl;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setIsCopied(true);
                    setTimeout(() => setIsCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy link', err);
                }
                document.body.removeChild(textArea);
            };

            const addLine = (type) => {
                let defaultPlan = '';
                if (type === 'Smartphone') defaultPlan = SMARTPHONE_PLANS[0].name;
                if (type === 'Tablet') defaultPlan = TABLET_PLANS[0].name;
                if (type === 'Watch') defaultPlan = WATCH_PLANS[0].name;
                if (type === 'Home Internet') defaultPlan = HOME_INTERNET_PLANS[0].name;
                if (type === 'Custom') defaultPlan = 'Custom';

                const newLine = {
                    id: Math.random().toString(36).substr(2, 9),
                    label: `Line ${lines.length + 1}`,
                    type,
                    customLineTypeLabel: '',
                    planName: defaultPlan,
                    customPlanName: '',
                    customPlanPrice: 0,
                    customAutopayDiscount: 0,
                    customDiscountSlots: 0,
                    deviceName: '',
                    devicePrice: 0,
                    promoCredit: 0,
                    perks: [],
                    adjustments: [],
                    individualProtection: false,
                };
                setLines(prev => [...prev, newLine]);
            };

            const copyLastLine = () => {
                if (lines.length === 0) return;
                const lastLine = lines[lines.length - 1];
                const newLine = {
                    ...lastLine,
                    id: Math.random().toString(36).substr(2, 9),
                    label: `Line ${lines.length + 1}`,
                    perks: [...lastLine.perks],
                    adjustments: lastLine.adjustments.map(a => ({ ...a, id: Math.random().toString(36).substr(2, 9) }))
                };
                setLines(prev => [...prev, newLine]);
            };

            const removeLine = (id) => setLines(prev => prev.filter(l => l.id !== id));
            
            const updateLine = (id, updates) => {
                setLines(prev => prev.map(l => {
                    if (l.id === id) {
                        const updated = { ...l, ...updates };
                        if (updates.type && updates.type !== l.type) {
                            if (updates.type === 'Smartphone') updated.planName = SMARTPHONE_PLANS[0].name;
                            else if (updates.type === 'Tablet') updated.planName = TABLET_PLANS[0].name;
                            else if (updates.type === 'Watch') updated.planName = WATCH_PLANS[0].name;
                            else if (updates.type === 'Home Internet') updated.planName = HOME_INTERNET_PLANS[0].name;
                            else if (updates.type === 'Custom') updated.planName = 'Custom';
                        }
                        return updated;
                    }
                    return l;
                }));
            };

            const togglePerk = (lineId, perkName) => {
                setLines(prev => prev.map(l => {
                    if (l.id === lineId) {
                        const hasPerk = l.perks.includes(perkName);
                        return { ...l, perks: hasPerk ? l.perks.filter(p => p !== perkName) : [...l.perks, perkName] };
                    }
                    return l;
                }));
            };

            const calculations = useMemo(() => {
                const spLines = lines.filter(l => l.type === 'Smartphone');
                const pricingTier = Math.min(spLines.length - 1, 3);
                let totalSlots = 0;
                spLines.forEach(l => {
                    if (l.planName === 'Custom') {
                        totalSlots += (parseInt(l.customDiscountSlots) || 0);
                    } else {
                        const p = SMARTPHONE_PLANS.find(plan => plan.name === l.planName);
                        if (p?.discountSlots) totalSlots += p.discountSlots;
                    }
                });

                const baseProcessed = lines.map(line => {
                    let planBase = 0, autopaySaving = 0, mhSaving = 0, displayName = line.planName, typeName = line.type;
                    
                    if (line.type === 'Custom') typeName = line.customLineTypeLabel || 'Custom Device';

                    if (line.planName === 'Custom') {
                        planBase = parseFloat(line.customPlanPrice) || 0;
                        autopaySaving = parseFloat(line.customAutopayDiscount) || 0;
                        displayName = line.customPlanName || 'Custom Plan';
                    } else if (line.type === 'Smartphone') {
                        const p = SMARTPHONE_PLANS.find(plan => plan.name === line.planName);
                        planBase = p ? p.costs[pricingTier] : 0;
                        autopaySaving = 10;
                    } else if (line.type === 'Home Internet') {
                        const p = HOME_INTERNET_PLANS.find(plan => plan.name === line.planName);
                        planBase = p?.price || 0;
                        autopaySaving = 10;
                        if (spLines.length > 0) mhSaving = 15;
                    } else if (line.type === 'Tablet') {
                        const p = TABLET_PLANS.find(plan => plan.name === line.planName);
                        planBase = p?.price || 0;
                    } else if (line.type === 'Watch') {
                        const p = WATCH_PLANS.find(plan => plan.name === line.planName);
                        planBase = p?.price || 0;
                    }

                    const perkCost = line.perks.reduce((acc, name) => acc + (PERKS.find(p => p.name === name)?.cost || 0), 0);
                    const adjSum = line.adjustments.reduce((acc, a) => acc + (a.type === 'credit' ? -(parseFloat(a.amount) || 0) : (parseFloat(a.amount) || 0)), 0);
                    
                    let protCost = 0;
                    if (!multiDeviceProtection && line.individualProtection && line.type !== 'Home Internet') {
                        if (line.type === 'Smartphone' || line.type === 'Watch') protCost = 19;
                        if (line.type === 'Tablet') protCost = 16;
                    }

                    const deviceMonthly = Math.max(0, (line.devicePrice / 36) - (line.promoCredit / 36));
                    const monthlyPromoCredit = (parseFloat(line.promoCredit) || 0) / 36;

                    return { ...line, typeName, planBase, autopaySaving, mhSaving, displayName, perkCost, protCost, deviceMonthly, adjSum, monthlyPromoCredit, finalPlan: planBase - autopaySaving - mhSaving };
                });

                let slotsRemaining = totalSlots;
                const finalLines = baseProcessed.map(l => {
                    let discountedAmt = 0;
                    let isDiscounted = false;
                    if ((l.type === 'Tablet' || l.type === 'Watch') && slotsRemaining > 0) {
                        slotsRemaining--;
                        discountedAmt = l.planBase * 0.5;
                        isDiscounted = true;
                    }
                    const actualPlanCost = isDiscounted ? (l.planBase - discountedAmt) : l.finalPlan;
                    return { ...l, isDiscounted, connectedDiscountAmt: discountedAmt, totalLineCost: actualPlanCost + l.perkCost + l.protCost + l.deviceMonthly + l.adjSum };
                });

                const protectableLinesCount = lines.filter(l => l.type !== 'Home Internet' && l.type !== 'Custom').length;
                const vmpCost = multiDeviceProtection ? Math.min(protectableLinesCount * 19, 68) : 0;
                
                const accAdjSum = accountAdjustments.reduce((acc, a) => acc + (a.type === 'credit' ? -(parseFloat(a.amount) || 0) : (parseFloat(a.amount) || 0)), 0);
                const total = finalLines.reduce((acc, l) => acc + l.totalLineCost, 0) + vmpCost + accAdjSum;
                
                const totalFullDeviceSavings = finalLines.reduce((acc, l) => acc + (parseFloat(l.promoCredit) || 0), 0);
                const totalAutopay = finalLines.reduce((acc, l) => acc + l.autopaySaving, 0);
                const totalMHSavings = finalLines.reduce((acc, l) => acc + l.mhSaving, 0);
                const totalConnectedDiscounts = finalLines.reduce((acc, l) => acc + (l.connectedDiscountAmt || 0), 0);
                const totalMonthlyPromoCredits = finalLines.reduce((acc, l) => acc + l.monthlyPromoCredit, 0);
                const allAdjustments = [...finalLines.flatMap(l => l.adjustments), ...accountAdjustments];
                const totalAdjustmentCredits = allAdjustments.reduce((acc, a) => acc + (a.type === 'credit' ? (parseFloat(a.amount) || 0) : 0), 0);
                
                const totalOneTimeCredits = oneTimeCredits.reduce((acc, c) => acc + (parseFloat(c.amount) || 0), 0);

                const totalMonthlySavings = totalMonthlyPromoCredits + totalAutopay + totalMHSavings + totalConnectedDiscounts + totalAdjustmentCredits;

                return { 
                    processedLines: finalLines, total, vmpCost, accAdjSum,
                    totalWithoutAutopay: total + totalAutopay,
                    totalFullDeviceSavings, totalMonthlySavings, totalAutopay, totalMHSavings, totalAdjustmentCredits, totalConnectedDiscounts, totalOneTimeCredits
                };
            }, [lines, multiDeviceProtection, accountAdjustments, oneTimeCredits]);

            // --- REACT PAGINATION ENGINE ---
            // This calculates exactly what fits on an 8.5x11 inch page and groups them.
            const paginatedContent = useMemo(() => {
                const pages = [];
                let currentItems = [];
                let currentHeight = 320; // Page 1 starts with the big Header block

                const pushPage = (isLast = false) => {
                    pages.push({ id: pages.length, items: [...currentItems], isFirst: pages.length === 0, isLast });
                    currentItems = [];
                    currentHeight = 60; // Top padding for subsequent pages
                };

                calculations.processedLines.forEach(line => {
                    // Calculate precise pixel height of this element based on content
                    let itemHeight = customerViewMode === 'detailed'
                        ? 90 + (line.perks.length * 18) + (line.adjustments.length * 18) + (line.deviceName ? 20 : 0) + (line.autopaySaving > 0 ? 18 : 0) + (line.mhSaving > 0 ? 18 : 0) + (line.isDiscounted ? 18 : 0) + (line.devicePrice > 0 ? 18 : 0) + (line.protCost > 0 ? 18 : 0)
                        : 70 + (line.perks.length > 0 ? 18 : 0);

                    if (currentHeight + itemHeight > 980) pushPage(); // 980px is max safe height
                    currentItems.push({ type: 'line', data: line });
                    currentHeight += itemHeight;
                });

                if (multiDeviceProtection || accountAdjustments.length > 0) {
                    let itemHeight = customerViewMode === 'detailed'
                        ? 60 + (multiDeviceProtection ? 18 : 0) + (accountAdjustments.length * 18)
                        : 60;
                    if (currentHeight + itemHeight > 980) pushPage();
                    currentItems.push({ type: 'account_services' });
                    currentHeight += itemHeight;
                }

                if (oneTimeCredits.length > 0) {
                    let itemHeight = customerViewMode === 'detailed'
                        ? 60 + (oneTimeCredits.length * 18)
                        : 60;
                    if (currentHeight + itemHeight > 980) pushPage();
                    currentItems.push({ type: 'otc' });
                    currentHeight += itemHeight;
                }

                // Footer block needs about 180px
                if (currentHeight + 180 > 980) pushPage();
                currentItems.push({ type: 'footer' });
                
                pushPage(true); // Push the final page
                return pages;
            }, [calculations, customerViewMode]);

            // --- 1:1 TRUE PDF CAPTURE LOGIC ---
            const handleSavePdf = async () => {
                setIsGeneratingPdf(true);
                
                // CRITICAL: Ensure all web fonts are fully loaded before capturing
                await document.fonts.ready;
                
                // Store current scroll to restore later, and snap to top to prevent canvas offset bugs
                const originalScrollY = window.scrollY;
                window.scrollTo(0, 0);

                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ format: 'letter', unit: 'pt' });
                
                // Create a temporary hidden workspace to render un-scaled clones
                const hiddenWorkspace = document.createElement('div');
                hiddenWorkspace.style.position = 'absolute';
                hiddenWorkspace.style.top = '0px';
                hiddenWorkspace.style.left = '-9999px'; // Hide off screen safely
                document.body.appendChild(hiddenWorkspace);

                try {
                    for (let i = 0; i < paginatedContent.length; i++) {
                        const pageNode = document.getElementById(`pdf-page-render-${i}`);
                        const clone = pageNode.cloneNode(true);
                        
                        // Force 1:1 scale for perfect clarity, overriding any mobile shrinking
                        clone.style.transform = 'none'; 
                        clone.style.margin = '0';
                        hiddenWorkspace.appendChild(clone);

                        const canvas = await html2canvas(clone, { 
                            scale: 2, // 2x Retina resolution capture
                            useCORS: true,
                            backgroundColor: '#ffffff',
                            logging: false,
                            windowWidth: 850 // Forces Tailwind to use desktop layout for the clone
                        });
                        
                        const imgData = canvas.toDataURL('image/jpeg', 0.98);
                        
                        if (i > 0) doc.addPage();
                        // Paste perfectly scaled image into PDF bounds
                        doc.addImage(imgData, 'JPEG', 0, 0, 612, 792);

                        hiddenWorkspace.innerHTML = ''; // Clear for next page
                    }
                    
                    const filename = `${customerName.trim() ? customerName.trim().split(' ')[0] + '_' : ''}Verizon_Quote.pdf`;
                    doc.save(filename);
                } catch (error) {
                    console.error("PDF Generation Error:", error);
                } finally {
                    document.body.removeChild(hiddenWorkspace);
                    window.scrollTo(0, originalScrollY); // Restore user position
                    setIsGeneratingPdf(false);
                }
            };

            const activeHardwareLine = lines.find(l => l.id === activeHardwareLineId);
            const activePerkLine = lines.find(l => l.id === activePerkLineId);
            const activeAdjLine = lines.find(l => l.id === activeAdjLineId);

            return (
                <div className="min-h-screen">
                    {/* Only show nav if not currently in print preview mode */}
                    {view !== 'print' && (
                        <nav className="sticky top-0 z-50 px-4 md:px-6 py-4 border-b border-black/10 flex justify-between items-center bg-stone-100/80 backdrop-blur-md text-black">
                            <div className="flex items-center">
                                <span className="text-lg md:text-xl font-black tracking-tight">verizon</span>
                                <span className="mx-2 md:mx-3 h-5 w-px bg-black/20"></span>
                                <span className="text-lg md:text-xl font-light tracking-tight opacity-60">TCC</span>
                            </div>
                            <div className="flex items-center gap-2 md:gap-3">
                                <button onClick={handleShareLink} title={isCopied ? "Copied!" : "Copy Share Link"} className="p-2 md:p-2.5 rounded-full transition-all flex items-center justify-center shadow-sm border border-black/10 bg-white text-black hover:bg-black hover:text-white relative">
                                    {isCopied ? <Icon name="Check" size={16} className="text-emerald-500" /> : <Icon name="Link" size={16}/>}
                                </button>
                                <button onClick={handlePrintPreview} title="Print Preview" className="p-2 md:p-2.5 rounded-full transition-all flex items-center justify-center shadow-sm border border-black/10 bg-white text-black hover:bg-black hover:text-white">
                                    <Icon name="Printer" size={16}/>
                                </button>
                                <div className="flex gap-1 md:gap-2 p-1 bg-black/5 rounded-full">
                                    <button onClick={() => setView('rep')} className={`px-2.5 md:px-6 py-1.5 md:py-2 rounded-full text-[10px] md:text-sm font-bold transition-all flex items-center gap-2 ${view === 'rep' ? 'bg-black text-white' : 'text-black/60 hover:text-black'}`}><Icon name="Settings" size={14} /> <span className="hidden sm:inline">Rep view</span><span className="sm:hidden">Rep</span></button>
                                    <button onClick={() => setView('customer')} className={`px-2.5 md:px-6 py-1.5 md:py-2 rounded-full text-[10px] md:text-sm font-bold transition-all flex items-center gap-2 ${view === 'customer' ? 'bg-black text-white' : 'text-black/60 hover:text-black'}`}><Icon name="Eye" size={14} /> <span className="hidden sm:inline">Customer view</span><span className="sm:hidden">Cust</span></button>
                                </div>
                            </div>
                        </nav>
                    )}

                    <main className={view === 'print' ? 'w-full' : 'max-w-[1340px] mx-auto p-4 md:p-6 mb-24 text-black'}>
                        {view === 'rep' && (
                            <div className="space-y-6">
                                <header>
                                    <h1 className="text-2xl md:text-3xl font-black leading-tight text-black">Quote builder.</h1>
                                    <p className="text-xs md:text-sm opacity-60 font-medium text-black">Configure hardware and lines.</p>
                                    
                                    {!showNameField ? (
                                        <button onClick={() => setShowNameField(true)} className="mt-2 text-[10px] font-bold uppercase tracking-widest text-black/40 hover:text-black flex items-center gap-1 transition-colors"><Icon name="Plus" size={12} /> Add customer name</button>
                                    ) : (
                                        <div className="mt-3 flex items-center gap-3 max-w-sm animate-in fade-in slide-in-from-left-2 duration-200">
                                            <input value={customerName} onFocus={e => e.target.select()} onChange={e => setCustomerName(e.target.value)} placeholder="Customer Name" className="flex-grow bg-white border border-black/10 px-3 py-2 rounded-lg text-xs font-bold focus:border-black outline-none" />

                                        </div>
                                    ))}
                                    <button onClick={() => setOneTimeCredits(prev => [...prev, { id: Math.random().toString(36).substr(2, 9), label: '', amount: '' }])} className="w-full py-6 border-2 border-dashed border-black/10 rounded-2xl text-black/40 hover:text-black font-bold flex items-center justify-center gap-3 transition-all text-base uppercase"><Icon name="PlusCircle" size={20}/> Add one-time credit</button>
                                </div>
                                <div className="p-8 border-t border-black/5 text-black"><button onClick={() => setShowOneTimeCreditsModal(false)} className="w-full py-6 bg-black text-white rounded-2xl font-black text-xl hover:scale-[1.01] active:scale-95 transition-all shadow-md text-white">Done</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
